name: Plantation Tracker Android PWA & Native Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build PWA Web Assets & Android App Bundle
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js runtime and cache dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. Install NPM dependencies & Build Web Assets
      - name: Install Dependencies
        run: npm ci

      - name: Run Build Suite (Logo & Map Generation)
        run: npm run build

      # 4. Integrate Capacitor native files
      - name: Sync Capacitor Android Project
        run: npx cap sync android

      # 5. Set up Java SE 17 environment for Gradle compilation
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 5b. Force-restore clean Gradle Wrapper JAR to prevent any Git-based binary corruption
      - name: Force Restore Clean gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar

      # 6. Set executable permission on Gradle Wrapper
      - name: Set Gradlew Executable
        run: chmod +x android/gradlew

      # 7. Build Native debug/release App and Bundle (AAB for Google Play Console)
      - name: Build Android App Bundle (Release AAB)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Build Test APK (Release Unsigned APK)
        run: |
          cd android
          ./gradlew assembleRelease

      # 8. Upload the artifacts for direct download
      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plantation-tracker-release-bundle (AAB)
          path: android/app/build/outputs/bundle/release/app-release-unsigned.aab

      - name: Upload Test APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plantation-tracker-test-apk (APK)
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
