name: Plantation Tracker Android PWA & Native Build

on:
  push:
    branches: [ main, master, better-gilmoreosaurus ]
  pull_request:
    branches: [ main, master, better-gilmoreosaurus ]

jobs:
  build:
    name: Build PWA Web Assets & Android App Bundle
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js runtime and cache dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. Install NPM dependencies & Build Web Assets
      - name: Install Dependencies
        run: npm ci

      - name: Run Build Suite (Logo & Map Generation)
        run: npm run build

      # 4. Integrate Capacitor native files
      - name: Sync Capacitor Android Project
        run: npx cap sync android

      # 5. Set up Java SE 21 environment for Gradle compilation
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # # 5b. Force-restore clean Gradle Wrapper JAR
      - name: Force Restore Clean gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar

      - name: Set Gradlew Executable
        run: chmod +x android/gradlew

      # 6b. Decode release keystore from secrets
      - name: Decode Release Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks

      - name: Build Signed Release AAB
        env:
          RELEASE_KEYSTORE_PATH: release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_VERSION_CODE: ${{ github.run_number }}
        run: cd android && ./gradlew bundleRelease

      - name: Build Signed Release APK
        env:
          RELEASE_KEYSTORE_PATH: release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_VERSION_CODE: ${{ github.run_number }}
        run: cd android && ./gradlew assembleRelease

      - name: Clean Up Keystore
        if: always()
        run: rm -f android/app/release.jks

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: plantation-tracker-release-bundle (AAB)
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: plantation-tracker-signed-apk (APK)
          path: android/app/build/outputs/apk/release/app-release.apk

        # 7. Decode release keystore from base64 secret
      - name: Decode Release Keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks

      # 8. Build signed Release AAB
      - name: Build Android App Bundle (Release AAB)
        env:
          RELEASE_KEYSTORE_PATH: release-key.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      # 9. Build signed Release APK
      - name: Build Release APK (Signed)
        env:
          RELEASE_KEYSTORE_PATH: release-key.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      # 10. Upload the signed artifacts
      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plantation-tracker-release-bundle (AAB)
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plantation-tracker-signed-apk (APK)
          path: android/app/build/outputs/apk/release/app-release.apk